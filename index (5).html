<!DOCTYPE HTML>
<html lang="ar" dir="rtl">
<head>
	<title>YACINE HUB</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

	<!-- Supabase -->
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

	<!-- FontAwesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

	<!-- Google Fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;700&family=Source+Sans+3:wght@900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

	<!-- Style -->
	<link rel="stylesheet" href="style.css" />
</head>
<body class="is-preload">

	<!-- Background lines -->
	<div class="bg-lines">
		<span></span><span></span><span></span><span></span><span></span>
	</div>

	<!-- Skeleton overlay -->
	<div id="skeleton-overlay">
		<div class="sk-logo">YACINE HUB</div>
		<div class="sk-bars">
			<div class="sk-bar"></div>
			<div class="sk-bar"></div>
			<div class="sk-bar"></div>
			<div class="sk-bar"></div>
		</div>
	</div>

	<!-- SCREEN 1 — LOGIN -->
	<div id="login-screen">
		<div class="login-container">

			<div class="logo-block">
				<div class="logo-icon">
					<i class="fa-brands fa-discord"></i>
				</div>
				<h1>YACINE HUB</h1>
				<p>منصة بناء السيرفرات الأسطورية</p>
			</div>

			<div class="login-card">

				<div class="auth-tabs">
					<div class="auth-tab active" id="tab-login"    onclick="switchTab('login')">دخول</div>
					<div class="auth-tab"        id="tab-register" onclick="switchTab('register')">تسجيل</div>
				</div>

				<!-- Login Form -->
				<div id="form-login">
					<div class="fields-row">
						<div class="field-group">
							<label>الاسم الأول</label>
							<input type="text" id="login-firstname" placeholder="ياسين" />
						</div>
						<div class="field-group">
							<label>الاسم الثاني</label>
							<input type="text" id="login-lastname" placeholder="سيتي" />
						</div>
					</div>
					<div class="field-group">
						<label>كلمة المرور</label>
						<input type="password" id="login-pass" placeholder="••••••••" />
					</div>
					<button id="login-btn" class="submit-btn">
						<span id="login-btn-text">دخول</span>
						<div class="btn-loader" id="login-loader"></div>
					</button>
					<div class="error-msg" id="login-error"></div>
				</div>

				<!-- Register Form -->
				<div id="form-register" style="display:none">
					<div class="fields-row">
						<div class="field-group">
							<label>الاسم الأول</label>
							<input type="text" id="reg-firstname" placeholder="ياسين" />
						</div>
						<div class="field-group">
							<label>الاسم الثاني</label>
							<input type="text" id="reg-lastname" placeholder="سيتي" />
						</div>
					</div>
					<div class="field-group">
						<label>كلمة المرور</label>
						<input type="password" id="reg-pass" placeholder="8 أحرف على الأقل" />
					</div>
					<div class="field-group">
						<label>تأكيد كلمة المرور</label>
						<input type="password" id="reg-pass-confirm" placeholder="••••••••" />
					</div>
					<button id="reg-btn" class="submit-btn">
						<span id="reg-btn-text">إنشاء حساب</span>
						<div class="btn-loader" id="reg-loader"></div>
					</button>
					<div class="error-msg" id="reg-error"></div>
				</div>

			</div><!-- /.login-card -->
		</div><!-- /.login-container -->
	</div><!-- /#login-screen -->

	<!-- SCREEN 2 — DASHBOARD -->
	<div id="dashboard-screen" style="display:none">

		<div class="dash-header">
			<h1 id="welcome-msg">جاري التحميل...</h1>
			<button class="submit-btn" onclick="logout()" style="width:auto; padding:0.6rem 1.4rem;">
				<i class="fa-solid fa-right-from-bracket"></i>
				&nbsp; خروج
			</button>
		</div>

		<div class="admin-only">
			<button class="submit-btn"
				style="width:auto; padding:0.6rem 1.4rem; background:#6bffb8; color:#0a0a0a;">
				<i class="fa-solid fa-plus"></i>
				&nbsp; إضافة درس جديد
			</button>
		</div>

		<div class="main-grid" id="lessons-list"></div>

	</div><!-- /#dashboard-screen -->

	<script src="script.js"></script>
</body>
</html>
